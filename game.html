<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Executive Function Task Switcher</title>

<style>
:root{
  --bg:#f4ecff;
  --ink:#0b2a4a;
  --accent:#0b2a4a;
  --grid:#d7cfee;
}

body{
  margin:0;
  background:var(--bg);
  font-family:system-ui;
  display:grid;
  place-items:center;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:18px;
  max-width:900px;
  width:100%;
}

h1{margin:0 0 10px;}

.settings{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}

.button{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:999px;
  font-weight:bold;
}

.rules{background:#f9f7ff;padding:10px;border-radius:10px;margin-bottom:15px;}

.stimulus{
  font-size:4rem;
  text-align:center;
  margin:20px 0;
}

.number{color:blue;}
.letter{color:red;}

.answer-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.answer-button{
  padding:18px;
  font-size:1.2rem;
  border-radius:14px;
  border:none;
  background:var(--accent);
  color:white;
  font-weight:bold;
}

.feedback{margin-top:10px;font-weight:bold;}
.correct{color:green;}
.incorrect{color:red;}

.progress-bar{
  height:12px;
  background:#e9e6f6;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  background:var(--accent);
  width:0%;
}

table{width:100%;margin-top:10px;border-collapse:collapse;font-size:0.8rem;}
td,th{border:1px solid #ddd;padding:4px;}
</style>
</head>

<body>

<div class="card">

<h1>Executive Function Task Switcher</h1>

<div class="settings">
<select id="sessionType">
  <option>Practice</option>
  <option selected>Before presentation</option>
  <option>After presentation</option>
</select>

<input id="trials" type="number" value="30">

<button class="button" onclick="start()">Start</button>
</div>

<div class="rules">
<strong>Blue number</strong><br>
Odd → Odd button<br>
Even → Even button<br><br>

<strong>Red letter</strong><br>
Vowel → Vowel button<br>
Consonant → Consonant button
</div>

<div id="stimulus" class="stimulus">Press Start</div>

<div id="progressText">Progress: 0 / 30</div>
<div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>

<div class="answer-buttons">
<button class="answer-button" data="odd">Odd</button>
<button class="answer-button" data="even">Even</button>
<button class="answer-button" data="vowel">Vowel</button>
<button class="answer-button" data="consonant">Consonant</button>
</div>

<div id="feedback" class="feedback"></div>
<div id="results"></div>

<h3>Saved sessions</h3>
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="clearData()">Clear</button>
<div id="table"></div>

</div>

<script>
let trial=0,total=30,correct=0,rts=[],startTime,correctAnswer;

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function vowel(l){return "AEIOU".includes(l);}

function start(){
  trial=0;
  correct=0;
  rts=[];
  total=parseInt(trials.value);
  next();
}

function updateProgress(){
  progressText.textContent=`Progress: ${trial} / ${total}`;
  progressFill.style.width=(trial/total*100)+"%";
}

function next(){
  if(trial>=total){end();return;}

  updateProgress();
  feedback.textContent="";

  if(Math.random()<0.5){
    let n=rand(1,9);
    stimulus.textContent=n;
    stimulus.className="stimulus number";
    correctAnswer=n%2===0?"even":"odd";
  }else{
    let l=String.fromCharCode(rand(65,90));
    stimulus.textContent=l;
    stimulus.className="stimulus letter";
    correctAnswer=vowel(l)?"vowel":"consonant";
  }

  startTime=performance.now();
}

document.querySelectorAll(".answer-button").forEach(b=>{
  b.onclick=()=>{
    if(trial>=total) return;

    let rt=performance.now()-startTime;

    if(b.getAttribute("data")==correctAnswer){
      correct++;
      rts.push(rt);
      feedback.textContent="Correct";
      feedback.className="feedback correct";
    }else{
      feedback.textContent="Incorrect";
      feedback.className="feedback incorrect";
    }

    trial++;

    if(trial>=total){
      setTimeout(end,400);
    }else{
      setTimeout(next,400);
    }
  };
});

function end(){
  updateProgress();

  let acc=(correct/total*100).toFixed(1);
  let avg=rts.length?Math.round(rts.reduce((a,b)=>a+b)/rts.length):0;

  stimulus.textContent="Finished";
  feedback.textContent="Task complete";

  results.innerHTML=`
    <h2>Results</h2>
    Session: ${sessionType.value}<br>
    Accuracy: ${acc}%<br>
    Avg reaction time: ${avg} ms
  `;

  let data=JSON.parse(localStorage.getItem("ef")||"[]");
  data.push({
    time:new Date().toLocaleString(),
    type:sessionType.value,
    acc,avg
  });
  localStorage.setItem("ef",JSON.stringify(data));
  render();

  sendToGoogleSheet(sessionType.value, total, correct, acc, avg);
}

function render(){
  let data=JSON.parse(localStorage.getItem("ef")||"[]");
  let html="<table><tr><th>Time</th><th>Type</th><th>Acc</th><th>RT</th></tr>";
  data.forEach(d=>{
    html+=`<tr><td>${d.time}</td><td>${d.type}</td><td>${d.acc}</td><td>${d.avg}</td></tr>`;
  });
  html+="</table>";
  table.innerHTML=html;
}

function downloadCSV(){
  let data=JSON.parse(localStorage.getItem("ef")||"[]");
  let csv="Time,Type,Accuracy,RT\n";
  data.forEach(d=>{
    csv+=`${d.time},${d.type},${d.acc},${d.avg}\n`;
  });
  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="results.csv";
  a.click();
}

function clearData(){
  localStorage.removeItem("ef");
  render();
}

function sendToGoogleSheet(sessionTypeValue, total, correct, acc, avg) {
  const formData = new FormData();

  formData.append("sessionType", sessionTypeValue);
  formData.append("trials", total);
  formData.append("correct", correct);
  formData.append("accuracy", acc);
  formData.append("averageReactionTime", avg);

  fetch("change", {
    method: "POST",
    mode: "no-cors",
    body: formData
  });
}

render();
</script>

</body>
</html>
